                       " id="js_content"><div><p style="text-align:left;font-family:'PingFang SC';font-size:16px;"><span style="letter-spacing:2px;color:#333333;">水星婆婆这几天在做月饼呀！嘻嘻</span></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"><span style="letter-spacing:2px;color:#333333;">从9.26到11.07是我一年一度的预算季，今年预算季要去七个地方，几乎每周都在出差，所以呢.....预算季开始以前，会发一个黄桃的疑似磅蛋糕，这不是一下子上海入秋了嘛！十一期间会把咖啡奶冻补上滴......</span></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"><span style="letter-spacing:2px;color:#333333;">其他就看缘分吧，大家不要脱粉哦！</span></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"><span style="letter-spacing:2px;color:#333333;">对了，这次预算季因为要去好多家不同的酒店，就给大家看在酒店吃的啥吧，嘻嘻！</span></p>
<p style="text-align:left;font-family:'PingFang SC';font-size:16px;"></p>
<span style="text-align:left;font-family:'PingFang SC';font-size:16px;"><span style="letter-spacing:2px;color:#333333;">这两天做的月饼，水平忽高忽低啊（扼腕！）还有今天四级考试的梗送给大家！棒棒哒！</span></span>
