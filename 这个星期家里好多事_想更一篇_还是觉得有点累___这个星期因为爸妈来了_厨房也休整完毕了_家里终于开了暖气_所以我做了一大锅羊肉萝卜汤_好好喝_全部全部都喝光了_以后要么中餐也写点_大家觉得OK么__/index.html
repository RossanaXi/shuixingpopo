    <title>这个星期家里好多事，想更一篇，还是觉得有点累。

这个星期因为爸妈来了，厨房也休整完毕了，家里终于开了暖气。所以我做了一大锅羊肉萝卜汤，好好喝，全部全部都喝光了。以后要么中餐也写点？大家觉得OK么？

天气冷，可以吃点甜甜的东西呀。
黄油奶酪蒜香大面包
秋风起，磅蛋糕来 3 - 黄桃磅蛋糕
冬日里的浓情蜜意 - 落叶古典巧克力蛋糕
愿你终身美丽！- 软糖布朗尼
可以忘记一切烦恼的布朗尼

啊....我好想吃古典巧克力蛋糕！！！

有个小女朋友来问我讨糖，昨天买了好看的糖纸和包装袋，冬天是做糖的季节呢。
哦，还可以出个圣诞特辑！

这是这个公号的第200篇文。水星婆婆祝各位有一个开心的冬季！</title>
